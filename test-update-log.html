<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版本更新日志测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .log {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>版本更新日志测试工具</h1>
    
    <div class="container">
        <h2>测试功能</h2>
        <button class="button" onclick="addTestVersions()">添加测试版本记录</button>
        <button class="button" onclick="clearTestData()">清除测试数据</button>
        <button class="button" onclick="showCurrentData()">查看当前数据</button>
        <button class="button" onclick="simulateUpdate()">模拟版本更新</button>
    </div>
    
    <div class="container">
        <h2>操作日志</h2>
        <div id="log" class="log"></div>
    </div>

    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = type;
            entry.innerHTML = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function addTestVersions() {
            try {
                // 测试数据 - 多个版本记录
                const versions = [
                    {
                        version: "3.2.40",
                        date: "2026-03-16",
                        changes: [
                            { type: "feature", text: "新增：版本更新日志多版本显示功能" },
                            { type: "improvement", text: "优化：提升编辑器加载速度" }
                        ],
                        createdAt: new Date().toISOString()
                    },
                    {
                        version: "3.2.39",
                        date: "2026-03-15",
                        changes: [
                            { type: "bugfix", text: "修复：背景图片显示问题" },
                            { type: "improvement", text: "优化：扩展加载机制" }
                        ],
                        createdAt: new Date(Date.now() - 86400000).toISOString() // 1天前
                    },
                    {
                        version: "3.2.38",
                        date: "2026-03-14",
                        changes: [
                            { type: "feature", text: "新增：捐款提示功能" },
                            { type: "other", text: "更新：依赖包版本" }
                        ],
                        createdAt: new Date(Date.now() - 172800000).toISOString() // 2天前
                    }
                ];
                
                // 保存到 localStorage
                localStorage.setItem('remixwarp_version_history', JSON.stringify(versions));
                
                // 设置上次查看的版本为旧版本
                localStorage.setItem('remixwarp_last_seen_version', '3.2.37');
                
                // 清除 "不再显示" 设置
                localStorage.removeItem('remixwarp_dont_show_updates');
                
                log('测试版本记录已添加成功！', 'success');
                log('版本历史已保存到 localStorage');
                log('上次查看版本已设置为 3.2.37');
                log('请刷新编辑器页面查看更新日志窗口');
            } catch (error) {
                log(`错误：${error.message}`, 'error');
            }
        }

        function clearTestData() {
            try {
                // 清除所有测试数据
                localStorage.removeItem('remixwarp_version_history');
                localStorage.removeItem('remixwarp_last_seen_version');
                localStorage.removeItem('remixwarp_dont_show_updates');
                
                log('测试数据已清除成功！', 'success');
                log('所有版本相关的 localStorage 数据已删除');
            } catch (error) {
                log(`错误：${error.message}`, 'error');
            }
        }

        function showCurrentData() {
            try {
                // 显示当前 localStorage 中的数据
                const history = localStorage.getItem('remixwarp_version_history');
                const lastSeen = localStorage.getItem('remixwarp_last_seen_version');
                const dontShow = localStorage.getItem('remixwarp_dont_show_updates');
                
                log('当前 localStorage 数据：', 'info');
                log(`上次查看版本：${lastSeen || '未设置'}`, 'info');
                log(`不再显示：${dontShow || '未设置'}`, 'info');
                
                if (history) {
                    const versions = JSON.parse(history);
                    log(`版本历史数量：${versions.length}`, 'info');
                    versions.forEach((v, i) => {
                        log(`版本 ${i+1}: ${v.version} (${v.date})`, 'info');
                    });
                } else {
                    log('版本历史：无', 'info');
                }
            } catch (error) {
                log(`错误：${error.message}`, 'error');
            }
        }

        function simulateUpdate() {
            try {
                // 模拟版本更新
                const currentVersion = "3.2.41";
                const newVersion = {
                    version: currentVersion,
                    date: new Date().toISOString().split('T')[0],
                    changes: [
                        { type: "feature", text: "新增：测试功能" },
                        { type: "bugfix", text: "修复：测试bug" }
                    ],
                    createdAt: new Date().toISOString()
                };
                
                // 获取现有历史
                const history = localStorage.getItem('remixwarp_version_history');
                let versions = history ? JSON.parse(history) : [];
                
                // 添加新版本
                versions.push(newVersion);
                
                // 只保留最近20个版本
                if (versions.length > 20) {
                    versions = versions.slice(-20);
                }
                
                // 保存更新后的历史
                localStorage.setItem('remixwarp_version_history', JSON.stringify(versions));
                
                // 保持上次查看版本不变，以便触发更新
                // 不更新 lastSeenVersion
                
                log('模拟版本更新成功！', 'success');
                log(`已添加新版本：${currentVersion}`, 'success');
                log('请刷新编辑器页面查看更新日志窗口');
            } catch (error) {
                log(`错误：${error.message}`, 'error');
            }
        }

        // 页面加载时显示当前数据
        window.onload = function() {
            log('测试工具已加载', 'info');
            log('点击按钮开始测试', 'info');
        };
    </script>
</body>
</html>
