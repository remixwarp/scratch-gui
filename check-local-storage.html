<!DOCTYPE html>
<html>
<head>
    <title>Check Local Storage</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .setting { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .value { font-weight: bold; }
    </style>
</head>
<body>
    <h1>Local Storage Check</h1>
    <div id="settings"></div>
    
    <script>
        // Check AESettings in localStorage
        const aeSettings = localStorage.getItem('AESettings');
        const settingsDiv = document.getElementById('settings');
        
        if (aeSettings) {
            try {
                const parsedSettings = JSON.parse(aeSettings);
                settingsDiv.innerHTML = '<h2>AESettings:</h2>';
                
                for (const [key, value] of Object.entries(parsedSettings)) {
                    settingsDiv.innerHTML += `
                        <div class="setting">
                            <strong>${key}:</strong> <span class="value">${value}</span>
                        </div>
                    `;
                }
            } catch (e) {
                settingsDiv.innerHTML = '<p style="color: red;">Error parsing AESettings: ' + e.message + '</p>';
            }
        } else {
            settingsDiv.innerHTML = '<p>AESettings not found in localStorage</p>';
        }
        
        // Check other relevant settings
        settingsDiv.innerHTML += '<h2>Other Relevant Settings:</h2>';
        settingsDiv.innerHTML += `<div class="setting"><strong>mw:multi-workspaces:</strong> <span class="value">${localStorage.getItem('mw:multi-workspaces')}</span></div>`;
    </script>
</body>
</html>
